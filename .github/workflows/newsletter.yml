name: HumZones automation

on:
  schedule:
    - cron: '0 6 * * 1'   # Mon 6am UTC: generate-filings
    - cron: '0 9 * * 1'   # Mon 9am UTC: send
    - cron: '0 6 * * 4'   # Thu 6am UTC: generate-news
    - cron: '0 9 * * 4'   # Thu 9am UTC: send
    - cron: '0 7 * * 0'   # Sun 7am UTC: discover-facilities
    - cron: '0 10 * * *'  # Daily 10am UTC: promote-facilities
    - cron: '0 8 * * 6'   # Sat 8am UTC: monitor-facilities
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run'
        required: true
        default: 'generate-filings'
        type: choice
        options:
          - generate-filings
          - generate-news
          - send
          - discover-facilities
          - promote-facilities
          - monitor-facilities
          - scrape-datacenter-fyi
      states:
        description: 'States to scrape (comma separated, e.g. tx,va). Leave blank for all states.'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * 1" ]; then
            echo "action=generate-filings" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * 4" ]; then
            echo "action=generate-news" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 7 * * 0" ]; then
            echo "action=discover-facilities" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * *" ]; then
            echo "action=promote-facilities" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 * * 6" ]; then
            echo "action=monitor-facilities" >> $GITHUB_OUTPUT
          else
            echo "action=send" >> $GITHUB_OUTPUT
          fi

      - name: Check out repo
        if: steps.action.outputs.action != 'send'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.action.outputs.action != 'send'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.action.outputs.action != 'send'
        run: npm install --no-audit --no-fund

      - name: Generate filings newsletter
        if: steps.action.outputs.action == 'generate-filings'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
          NEWSLETTER_TYPE: filings
        run: node scripts/generate-newsletter.js

      - name: Generate news newsletter
        if: steps.action.outputs.action == 'generate-news'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
          NEWSLETTER_TYPE: news
        run: node scripts/generate-newsletter.js

      - name: Discover new facilities
        if: steps.action.outputs.action == 'discover-facilities'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
        run: node scripts/discover-facilities.js

      - name: Promote approved facilities
        if: steps.action.outputs.action == 'promote-facilities'
        env:
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
        run: node scripts/promote-facilities.js

      - name: Monitor facility status
        if: steps.action.outputs.action == 'monitor-facilities'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
        run: node scripts/monitor-facilities.js

      - name: Scrape datacenter.fyi (manual only)
        if: steps.action.outputs.action == 'scrape-datacenter-fyi'
        env:
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
          STATES: ${{ github.event.inputs.states || '' }}
        run: node scripts/scrape-datacenter-fyi.js

      - name: Send newsletter
        if: steps.action.outputs.action == 'send'
        run: |
          curl -X POST https://humzones.com/api/newsletter \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"send"}' \
            --verbose \
            --fail-with-body \
            --max-time 60 \
            -w "\nHTTP Status: %{http_code}\n"
