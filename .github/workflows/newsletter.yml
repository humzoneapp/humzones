name: Newsletter weekly

on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - send

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * 1" ]; then
            echo "action=generate" >> $GITHUB_OUTPUT
          else
            echo "action=send" >> $GITHUB_OUTPUT
          fi

      - name: Check out repo
        if: steps.action.outputs.action == 'generate'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.action.outputs.action == 'generate'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.action.outputs.action == 'generate'
        run: npm install --no-audit --no-fund

      - name: Generate newsletter
        if: steps.action.outputs.action == 'generate'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_KEY: ${{ secrets.AIRTABLE_KEY }}
        run: node scripts/generate-newsletter.js

      - name: Send newsletter
        if: steps.action.outputs.action == 'send'
        run: |
          curl -X POST https://humzones.com/api/newsletter \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"send"}' \
            --verbose \
            --fail-with-body \
            --max-time 60 \
            -w "\nHTTP Status: %{http_code}\n"
