name: Newsletter weekly

on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - send

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secret prefix
        run: |
          echo "Secret prefix: ${SECRET:0:4}"
        env:
          SECRET: ${{ secrets.CRON_SECRET }}

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * 1" ]; then
            echo "action=generate" >> $GITHUB_OUTPUT
          else
            echo "action=send" >> $GITHUB_OUTPUT
          fi

      - name: Generate newsletter
        if: steps.action.outputs.action == 'generate'
        run: |
          curl -X POST https://humzones.com/api/generate-newsletter \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --verbose \
            --fail-with-body \
            --max-time 90 \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Send newsletter
        if: steps.action.outputs.action == 'send'
        run: |
          curl -X POST https://humzones.com/api/newsletter \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"send"}' \
            --verbose \
            --fail-with-body \
            --max-time 90 \
            -w "\nHTTP Status: %{http_code}\n"
